<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8fafc;
        }

        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: #1f2937;
        }

        .sidebar .nav-link {
            color: #d1d5db;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 4px;
            transition: 0.2s ease;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: #2563eb;
            color: #fff;
        }

        .sidebar h5 {
            color: #fff;
        }

        .content {
            flex: 1;
            padding: 24px;
        }
    </style>
</head>

<body>

    <div class="d-flex">
        <!-- Sidebar -->
        <aside class="sidebar p-3">
            <h5 class="mb-4 text-center">📘 Buku Tamu</h5>
            <ul class="nav nav-pills flex-column">
                <li class="nav-item">
                    <a href="#" class="nav-link active">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Form Tamu</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Data Pengunjung</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Laporan</a>
                </li>
                <li class="nav-item mt-3">
                    <a href="#" class="nav-link text-danger">Logout</a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <h2>Dashboard</h2>
            <p>Selamat datang di sistem Buku Tamu Digital.</p>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
